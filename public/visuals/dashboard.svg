<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="Dashboard métier Qwestinum">
  <!-- Fond -->
  <rect width="800" height="600" fill="#F4F0E8"/>

  <!-- Cadre fenêtre application -->
  <rect x="40" y="40" width="720" height="520" rx="8" fill="#FAF7F0" stroke="#D8D2C2" stroke-width="1"/>

  <!-- Barre de titre -->
  <rect x="40" y="40" width="720" height="40" rx="8" fill="#2A2724"/>
  <rect x="40" y="72" width="720" height="8" fill="#2A2724"/>

  <!-- Boutons fenêtre -->
  <circle cx="60" cy="60" r="5" fill="#A8861C"/>
  <circle cx="78" cy="60" r="5" fill="#807D75"/>
  <circle cx="96" cy="60" r="5" fill="#D8D2C2"/>

  <!-- Titre -->
  <text x="120" y="65" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#F4F0E8" letter-spacing="0.5">QWESTINUM — Dashboard Finance</text>
  <text x="710" y="64" font-family="Inter, sans-serif" font-size="10" fill="#807D75" letter-spacing="1" text-anchor="end">7 derniers jours</text>

  <!-- Header section -->
  <text x="70" y="115" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#807D75" letter-spacing="2">DÉPARTEMENT FINANCE · INDICATEURS CLÉS</text>

  <!-- Ligne 1 — KPI Cards (3 cards) -->
  <!-- Card 1 — Tâches traitées -->
  <g>
    <rect x="70" y="135" width="200" height="100" rx="4" fill="#FAF7F0" stroke="#D8D2C2" stroke-width="1"/>
    <text x="85" y="155" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#807D75" letter-spacing="1.5">TÂCHES TRAITÉES</text>
    <text x="85" y="195" font-family="Fraunces, serif" font-size="32" font-weight="500" fill="#2A2724">2 847</text>
    <g transform="translate(85, 215)">
      <text font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#A8861C">↗ +18,4%</text>
      <text x="55" font-family="Inter, sans-serif" font-size="9" fill="#807D75">vs semaine -1</text>
    </g>
  </g>

  <!-- Card 2 — Coût par tâche -->
  <g>
    <rect x="290" y="135" width="200" height="100" rx="4" fill="#FAF7F0" stroke="#D8D2C2" stroke-width="1"/>
    <text x="305" y="155" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#807D75" letter-spacing="1.5">COÛT PAR TÂCHE</text>
    <g transform="translate(305, 195)">
      <text font-family="Fraunces, serif" font-size="32" font-weight="500" fill="#2A2724">0,043</text>
      <text x="98" y="-2" font-family="Inter, sans-serif" font-size="11" fill="#807D75">€</text>
    </g>
    <g transform="translate(305, 215)">
      <text font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#A8861C">↘ −22,1%</text>
      <text x="55" font-family="Inter, sans-serif" font-size="9" fill="#807D75">vs baseline</text>
    </g>
  </g>

  <!-- Card 3 — Validations humaines -->
  <g>
    <rect x="510" y="135" width="200" height="100" rx="4" fill="#FAF7F0" stroke="#D8D2C2" stroke-width="1"/>
    <text x="525" y="155" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#807D75" letter-spacing="1.5">VALIDATION HUMAINE</text>
    <g transform="translate(525, 195)">
      <text font-family="Fraunces, serif" font-size="32" font-weight="500" fill="#2A2724">12,8</text>
      <text x="78" y="-2" font-family="Inter, sans-serif" font-size="11" fill="#807D75">%</text>
    </g>
    <g transform="translate(525, 215)">
      <text font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#807D75">cible : ≤ 15%</text>
    </g>
  </g>

  <!-- Section Throughput -->
  <text x="70" y="265" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#807D75" letter-spacing="2">THROUGHPUT — TÂCHES PAR HEURE</text>

  <!-- Graphique zone -->
  <rect x="70" y="280" width="640" height="180" rx="4" fill="#FAF7F0" stroke="#D8D2C2" stroke-width="1"/>

  <!-- Axe Y labels -->
  <text x="83" y="305" font-family="Inter, sans-serif" font-size="8" fill="#807D75">160</text>
  <text x="83" y="345" font-family="Inter, sans-serif" font-size="8" fill="#807D75">120</text>
  <text x="83" y="385" font-family="Inter, sans-serif" font-size="8" fill="#807D75">80</text>
  <text x="83" y="425" font-family="Inter, sans-serif" font-size="8" fill="#807D75">40</text>

  <!-- Lignes horizontales grille -->
  <line x1="105" y1="302" x2="700" y2="302" stroke="#D8D2C2" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="105" y1="342" x2="700" y2="342" stroke="#D8D2C2" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="105" y1="382" x2="700" y2="382" stroke="#D8D2C2" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="105" y1="422" x2="700" y2="422" stroke="#D8D2C2" stroke-width="0.5" stroke-dasharray="2,2"/>

  <!-- Courbe throughput (zone remplie + ligne) -->
  <path d="M 110 405 L 195 380 L 280 365 L 365 340 L 450 320 L 535 305 L 620 295 L 700 290 L 700 440 L 110 440 Z"
        fill="#D4A82C" fill-opacity="0.15"/>
  <path d="M 110 405 L 195 380 L 280 365 L 365 340 L 450 320 L 535 305 L 620 295 L 700 290"
        fill="none" stroke="#D4A82C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Points sur la courbe -->
  <circle cx="110" cy="405" r="3" fill="#FAF7F0" stroke="#D4A82C" stroke-width="2"/>
  <circle cx="195" cy="380" r="3" fill="#FAF7F0" stroke="#D4A82C" stroke-width="2"/>
  <circle cx="280" cy="365" r="3" fill="#FAF7F0" stroke="#D4A82C" stroke-width="2"/>
  <circle cx="365" cy="340" r="3" fill="#FAF7F0" stroke="#D4A82C" stroke-width="2"/>
  <circle cx="450" cy="320" r="3" fill="#FAF7F0" stroke="#D4A82C" stroke-width="2"/>
  <circle cx="535" cy="305" r="3" fill="#FAF7F0" stroke="#D4A82C" stroke-width="2"/>
  <circle cx="620" cy="295" r="3" fill="#FAF7F0" stroke="#D4A82C" stroke-width="2"/>
  <circle cx="700" cy="290" r="4" fill="#A8861C" stroke="#FAF7F0" stroke-width="2"/>

  <!-- Étiquette dernière valeur -->
  <rect x="638" y="263" width="62" height="22" rx="3" fill="#2A2724"/>
  <text x="669" y="278" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F4D35E" text-anchor="middle">156 t/h</text>

  <!-- Axe X labels -->
  <text x="110" y="450" font-family="Inter, sans-serif" font-size="8" fill="#807D75" text-anchor="middle">L</text>
  <text x="195" y="450" font-family="Inter, sans-serif" font-size="8" fill="#807D75" text-anchor="middle">M</text>
  <text x="280" y="450" font-family="Inter, sans-serif" font-size="8" fill="#807D75" text-anchor="middle">M</text>
  <text x="365" y="450" font-family="Inter, sans-serif" font-size="8" fill="#807D75" text-anchor="middle">J</text>
  <text x="450" y="450" font-family="Inter, sans-serif" font-size="8" fill="#807D75" text-anchor="middle">V</text>
  <text x="535" y="450" font-family="Inter, sans-serif" font-size="8" fill="#807D75" text-anchor="middle">S</text>
  <text x="620" y="450" font-family="Inter, sans-serif" font-size="8" fill="#807D75" text-anchor="middle">D</text>
  <text x="700" y="450" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#A8861C" text-anchor="middle">AUJ.</text>

  <!-- Footer KPI agents -->
  <line x1="70" y1="490" x2="730" y2="490" stroke="#D8D2C2" stroke-width="1"/>

  <g transform="translate(70, 515)">
    <text font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#807D75" letter-spacing="1.5">AGENTS · STATUT</text>
  </g>

  <g transform="translate(195, 515)">
    <circle cx="0" cy="-3" r="3" fill="#D4A82C"/>
    <text x="10" font-family="Inter, sans-serif" font-size="10" fill="#2A2724">5 actifs</text>
  </g>
  <g transform="translate(285, 515)">
    <circle cx="0" cy="-3" r="3" fill="#807D75"/>
    <text x="10" font-family="Inter, sans-serif" font-size="10" fill="#2A2724">2 en veille</text>
  </g>
  <g transform="translate(390, 515)">
    <text font-family="Inter, sans-serif" font-size="10" fill="#807D75">·</text>
    <text x="10" font-family="Inter, sans-serif" font-size="10" fill="#2A2724">file d'attente : 14 tâches</text>
  </g>
  <g transform="translate(595, 515)">
    <text font-family="Inter, sans-serif" font-size="10" fill="#807D75">·</text>
    <text x="10" font-family="Inter, sans-serif" font-size="10" fill="#A8861C" font-weight="600">SLA : OK</text>
  </g>
</svg>
